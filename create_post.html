{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2>Новый пост</h2>
    <form method="post" action="/posts/new">
        <div class="form-group">
            <label for="title">Заголовок</label>
            <input type="text" id="title" name="title" required placeholder="Введите заголовок">
        </div>
        <div class="form-group">
            <label for="body">Текст поста</label>
            <textarea id="body" name="body" rows="6" required placeholder="Напишите что-нибудь интересное..." style="width:100%; padding:0.75rem; border-radius:8px; background:var(--bg-color); color:var(--text-primary); border:1px solid var(--border);"></textarea>
        </div>
        <button type="submit" class="btn">Опубликовать</button>
        <a href="/" style="margin-left: 1rem; color: var(--text-secondary); text-decoration: none;">Отмена</a>
    </form>
</div>
{% endblock %}
